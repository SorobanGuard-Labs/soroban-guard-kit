services:
  app:
    build:
      context: .
      target: dev
    container_name: soroban-guard-kit-dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      HOSTNAME: "0.0.0.0"
      WATCHPACK_POLLING: "true"
    command: npm run dev -- --hostname 0.0.0.0