version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: soroban-guard-kit-dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - .env.example
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true